# ======================================================================
# IPC2221 CLEARANCE/CREEPAGE TABLES (Alternative Standard)
# ======================================================================

# IPC2221 does not differentiate between clearance and creepage
# The spacing values apply to both air gap (clearance) and surface path (creepage)
# Values are more conservative than IEC60664-1 for some voltage ranges
# Based on IPC2221 Table 6-1: Conductor Spacing

# IPC2221 Table 6-1: External Layers (B1-B6) - Uncoated
# Use these values when PCB is not conformally coated
[[clearance_creepage.ipc2221_spacing_table]]
layer_type = "External (B1-B6)"
condition = "Uncoated"
note = "For uncoated external layers, applies to both clearance and creepage"
voltages = [
    [0.0, 0.13],      # 0-15V DC (5 mil minimum fab capability)
    [30.0, 0.13],     # 16-30V DC
    [50.0, 0.13],     # 31-50V DC (SELV range)
    [100.0, 0.25],    # 51-100V DC (10 mil)
    [150.0, 0.4],     # 101-150V DC
    [170.0, 0.5],     # 151-170V DC (20 mil)
    [250.0, 0.8],     # 171-250V DC (mains range)
    [300.0, 0.8],     # 251-300V DC
    [500.0, 1.5],     # 301-500V DC (60 mil)
]

# IPC2221 Table 6-1: External Layers (B1-B6) - Coated
# Conformal coating allows reduced spacing
[[clearance_creepage.ipc2221_spacing_table]]
layer_type = "External (B1-B6)"
condition = "Coated (Conformal)"
note = "For conformally coated external layers, reduced spacing allowed"
voltages = [
    [0.0, 0.13],      # 0-15V DC (5 mil - no reduction)
    [30.0, 0.13],     # 16-30V DC
    [50.0, 0.13],     # 31-50V DC (SELV range)
    [100.0, 0.13],    # 51-100V DC (coating provides insulation)
    [150.0, 0.13],    # 101-150V DC
    [170.0, 0.13],    # 151-170V DC
    [250.0, 0.4],     # 171-250V DC (mains range)
    [300.0, 0.4],     # 251-300V DC
    [500.0, 0.8],     # 301-500V DC
]

# IPC2221 Table 6-1: Internal Layers (B2-B4) - Embedded in substrate
# Internal layers inherently "coated" by PCB laminate
[[clearance_creepage.ipc2221_spacing_table]]
layer_type = "Internal (B2-B4)"
condition = "Embedded"
note = "For internal layers embedded in PCB substrate"
voltages = [
    [0.0, 0.1],       # 0-15V DC (4 mil)
    [30.0, 0.1],      # 16-30V DC
    [50.0, 0.1],      # 31-50V DC (SELV range)
    [100.0, 0.2],     # 51-100V DC (8 mil)
    [150.0, 0.32],    # 101-150V DC
    [170.0, 0.4],     # 151-170V DC
    [250.0, 0.6],     # 171-250V DC (mains range)
    [300.0, 0.6],     # 251-300V DC
    [500.0, 1.27],    # 301-500V DC (50 mil)
]

# IPC2221 Table 6-2: AC Voltage Peak Conversion
# For AC voltages, use peak voltage (RMS × 1.414) to look up spacing
# Example: 230V AC RMS = 325V peak → use 300-500V range
[[clearance_creepage.ipc2221_ac_conversion]]
note = "AC voltage handling"
conversion = "voltage_peak = voltage_rms × 1.414"
example = "230V AC RMS = 325V peak → use 300-500V range from table"

# ======================================================================
# VOLTAGE DOMAIN DEFINITIONS
# ======================================================================
# Define voltage domains on your PCB for clearance/creepage checking
# Use KiCad Net Classes (preferred) or net_patterns (fallback)
# Each domain: name, description, voltage_rms, net_patterns, requires_reinforced_insulation
#
[[clearance_creepage.voltage_domains]]
name = "MAINS_L"
description = "AC Mains Live (230V)"
voltage_rms = 230
net_patterns = ["AC_L", "MAINS_L", "L_MAINS", "LINE"]
requires_reinforced_insulation = true

[[clearance_creepage.voltage_domains]]
name = "MAINS_N"
description = "AC Mains Neutral"
voltage_rms = 0
net_patterns = ["AC_N", "MAINS_N", "N_MAINS", "NEUTRAL"]

[[clearance_creepage.voltage_domains]]
name = "HV_8kV"
description = "High voltage DC bus (8000V)"
voltage_rms = 8000
net_patterns = ["8kV", "8000V"]
requires_reinforced_insulation = false

[[clearance_creepage.voltage_domains]]
name = "HIGH_VOLTAGE_DC"
description = "High voltage DC bus (400V)"
voltage_rms = 400
net_patterns = ["HV+", "HV-", "HVDC", "400V"]
requires_reinforced_insulation = true

[[clearance_creepage.voltage_domains]]
name = "LOW_VOLTAGE_DC"
description = "Low voltage DC (12-48V)"
voltage_rms = 24
net_patterns = ["12V", "24V", "48V", "+12V", "+24V", "+48V"]

[[clearance_creepage.voltage_domains]]
name = "EXTRA_LOW_VOLTAGE"
description = "Extra low voltage / SELV (≤50V)"
voltage_rms = 5
net_patterns = ["3V3", "5V", "12V", "+3V3", "+5V", "VCC", "VDD"]

[[clearance_creepage.voltage_domains]]
name = "GROUND"
description = "Ground / chassis reference"
voltage_rms = 0
net_patterns = ["GND", "GROUND", "PGND", "AGND", "DGND", "CHASSIS", "PE"]

# ======================================================================
# SAFETY ISOLATION REQUIREMENTS
# ======================================================================
# Define isolation levels for specific domain pairs
[[clearance_creepage.isolation_requirements]]
domain_a = "MAINS_L"
domain_b = "EXTRA_LOW_VOLTAGE"
isolation_type = "reinforced"
min_clearance_mm = 6.0
min_creepage_mm = 8.0
description = "Mains to SELV - Reinforced"

[[clearance_creepage.isolation_requirements]]
domain_a = "HIGH_VOLTAGE_DC"
domain_b = "LOW_VOLTAGE_DC"
isolation_type = "basic"
min_clearance_mm = 4.0
min_creepage_mm = 5.0
description = "HV to LV"

[[clearance_creepage.isolation_requirements]]
domain_a = "MAINS_L"
domain_b = "GROUND"
isolation_type = "basic"
min_clearance_mm = 2.5
min_creepage_mm = 3.2
description = "Mains to Ground"

# ======================================================================
# IMPLEMENTATION NOTES
# ======================================================================
# Algorithm: Parse voltage_domains, calculate clearance (3D air gap) and creepage (surface path)
# Requirements: isolation_requirements or IEC60664/IPC2221 tables, apply safety_margin_factor
# Advanced: Detect slots/cutouts, conformal coating, isolation barriers, temperature derating

# ======================================================================
# SIGNAL INTEGRITY RULES
# ======================================================================
[signal_integrity]
enabled = true
description = "Signal integrity checks — controls all SI sub-checks below"

# Default critical net classes (used by checks that don't define their own)
critical_net_classes = ["HighSpeed", "Clock", "DDR", "USB", "HDMI", "50R"]

# ======================================================================
# CHECK 5: Net Length Maximum
# ======================================================================
[signal_integrity.net_length]
enabled = true
description = "Flag nets exceeding maximum routed length per net class"

# Maximum routed length per net class (mm). Add/remove entries as needed.
# USB 2.0: 450mm max recommended. DDR4: strict topology constraints.
max_length_by_netclass = { HighSpeed = 150.0, Clock = 100.0, DDR = 80.0, USB = 450.0, 50R = 100.0 }

# ======================================================================
# CHECK 4: Exposed Critical Traces
# ======================================================================
[signal_integrity.exposed_traces]
enabled = true
description = "Flag critical net traces on outer layers exceeding allowed exposed length"

# Maximum total length on outer layers (F.Cu / B.Cu) per critical net (mm)
# Exceeding this suggests the trace should be buried on an inner layer (stripline)
max_exposed_length_mm = 20.0

# Net classes considered critical for this check
critical_net_classes = ["HighSpeed", "Clock", "DDR", "USB", "HDMI", "50R"]

# ======================================================================
# CHECK 8: Unconnected Via Pads
# ======================================================================
[signal_integrity.unconnected_via_pads]
enabled = true
description = "Flag through vias that have floating (unconnected) pads on internal layers"

# True = only check nets in critical_net_classes. False = check all nets.
check_critical_nets_only = true

# Net classes to check when check_critical_nets_only = true
critical_net_classes = ["HighSpeed", "Clock", "DDR", "USB", "HDMI"]

# ======================================================================
# CHECK 14: Controlled Impedance
# ======================================================================
[signal_integrity.impedance]
enabled = true
description = "Controlled impedance verification using analytical transmission line formulas"

# Target impedances per KiCad Net Class (ohms)
# Net Class names from KiCad design → target impedance
target_impedance_by_class = { USB = 90.0, HDMI = 100.0, DDR = 50.0, HighSpeed = 50.0, 50R = 50.0, T1S = 50.0, T1S_diff = 100.0 }

# Net classes treated as differential pairs (Z_diff is calculated instead of Z0)
# These nets must have a detected P/N partner to trigger differential calculation.
differential_net_classes = ["USB", "HDMI", "LVDS", "CAN", "RS485", "PCIe", "PCIE", "T1S_diff"]

# Impedance tolerance (ohms) - applied to all net classes
# Example: USB 90Ω ± 5Ω → acceptable range 85-95Ω, HighSpeed 50Ω ± 5Ω → 45-55Ω
impedance_tolerance_ohms = 5.0

# Minimum segment length to check (mm) - skip very short segments
# Short segments are typically vias, fanout stubs, or pad connections
# Default: 1.0mm (adjustable based on design density)
min_segment_length_mm = 1.0

# Calculation method: Analytical formulas (IPC-2141, Wadell)
# - Microstrip: External layer with plane below
# - Stripline: Internal layer between planes
# - CPW: Coplanar waveguide with/without plane
# Accuracy: ±5-10% (sufficient for DRC, much faster than FEM)

# Stackup data is automatically read from the .kicad_pcb file (stackup section)
# Falls back to FR-4 defaults (35μm copper, εr=4.3) if parsing fails

# ======================================================================
# CHECK 2: Trace Near Plane Edge
# ======================================================================
[signal_integrity.trace_near_plane_edge]
enabled = true
description = "Flag critical net traces routed too close to their reference plane boundary"

# Minimum distance from trace to reference plane polygon edge (mm)
min_edge_distance_mm = 3.0

# Net classes to check
critical_net_classes = ["HighSpeed", "Clock", "DDR", "USB", "HDMI", "50R"]

# Net name substrings that identify reference planes (GND/power pours)
reference_plane_patterns = ["GND", "PWR", "VCC", "VDD", "POWER", "AGND", "DGND", "PGND"]

# ======================================================================
# CHECK 1B: Trace Near Board Edge (EMI + Manufacturing)
# ======================================================================
[signal_integrity.trace_near_board_edge]
enabled = true
description = "Flag critical net traces routed too close to physical board outline (Edge.Cuts)"

# Minimum distance from trace to board edge (mm)
# - Manufacturing reliability (IPC-2221): ≥0.5mm prevents damage during routing/v-scoring
# - EMI best practice: ≥5mm for signals >100MHz (board edge acts as antenna)
# - High-speed critical signals (USB, HDMI, PCIe): ≥10mm recommended
min_board_edge_distance_mm = 5.0

# Net classes to check
critical_net_classes = ["HighSpeed", "Clock", "DDR", "USB", "HDMI", "50R"]

# ======================================================================
# CHECK 7: Unreferenced Traces
# ======================================================================
[signal_integrity.unreferenced_traces]
enabled = true
description = "Flag critical net segments not covered by a reference plane on either adjacent layer"

# Maximum total unreferenced length per net before violation (mm)
# The checker scans adjacent copper layers (above/below the signal layer) for GND/power zones.
# On a 2-layer board with GND pour on B.Cu and signal on F.Cu this is correctly detected.
max_unreferenced_length_mm = 1.0

# Net classes to check.
# NOTE: Do NOT add impedance-only classes (e.g. '50R') here if those traces are intentionally
# placed in isolated/HV regions with no reference plane by design (e.g. HV attenuator boards).
critical_net_classes = ["HighSpeed", "Clock", "DDR", "USB", "HDMI"]

# Net name substrings that identify reference planes
reference_plane_patterns = ["GND", "PWR", "VCC", "VDD", "POWER", "AGND", "DGND", "PGND"]

# ======================================================================
# CHECK 9: Critical Net Isolation (Single-Ended)
# ======================================================================
[signal_integrity.critical_net_isolation_se]
enabled = true
description = "Flag critical single-ended nets closer than 3W rule to non-ground traces"

# Net classes considered critical for isolation checking
critical_net_classes = ["HighSpeed", "Clock", "DDR", "USB", "HDMI", "50R"]

# Isolation method: 3W rule applies spacing = three_w_multiplier * trace_width
# Set min_isolation_mm > 0 for a fixed floor independent of trace width
three_w_multiplier = 3.0
min_isolation_mm = 0.0

# Net name substrings recognised as ground guard traces (exempt from violation)
ground_net_patterns = ["GND", "AGND", "DGND", "PGND", "CHASSIS", "PE"]

# ======================================================================
# CHECK 6: Differential Pair Length Matching
# ======================================================================
[signal_integrity.differential_pair_matching]
enabled = true
description = "Flag differential pairs whose P and N trace lengths differ beyond tolerance"

# Maximum allowed intra-pair length mismatch per net class (mm)
# Pairs whose net class is not listed use default_max_mismatch_mm
max_length_mismatch_by_class = { USB = 0.5, HDMI = 0.3, DDR = 5.0, HighSpeed = 1.0 }
default_max_mismatch_mm = 1.0
